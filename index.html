<html lang="en">
    <head>
        <title>RNG</title>
        <meta charset="UTF-8">
        <meta name="description" content="Generate a number">
        <meta name="keywords" content="Random number generator, RNG, random, number, generator, random number">
        <meta name="author" content="powerNotsans">
        <meta name="Viewport" content="width=device=width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="index.css">
        <meta name="referrer" content="strict-origin-when-cross-origin">
    </head>

    <body class="p">

        <header id="idheader">
            <p id="idtimer"></p>
        </header>

        <main>


            <section id="idbackground"></section>
            <form>
                <div id="idformdiv" class="classmainfont">
                    <form id="idform">
                        <label for="idmax">Maximum Value:</label>
                        <input id="idmax" type="number" min="-2147483648" max="2147483648" value="0" required>
                        <br>
                        <label for="idmin">Minimum Value:</label>
                        <input id="idmin" type="number" min="-2147483648" max="2147483648" value="0" required>
                        <br>
                        <label for="idtickbox1">Replicated:</label>
                        <input id="idtickbox1" type="checkbox" checked required>
                        <br>
                        <input type="reset" id="idresetbtn" class="buttons">
                        <br>
                        <button id="idbtn" class="buttons">Enter</button>
                    </from>
                </div>
            </form>

            <section id="idnumberdisplaycontainer">
                <p id="idnumberdisplay">0</p>
            </section>

            <br> 

            <div id="iddiv2" class="classmainfont">
                <button id="idcontinue" class="idcs buttons">Continue</button>
                <br>
                <label for="idremselect">Remove a number:</label>
                <select id="idremselect" size="3">
                </select>
                <br>
            </div>

            <button id="idrembtn" class="bottombuttons buttons">Remove</button>

            <br>

            <!--<button id="idclear" class="bottombuttons buttons">Clear</button>-->
        </main>

        <footer id="idfooter">
            <a href="https://www.youtube.com/@powerNotsans" target="_blank"><img width="50" height="50" src="Youtube.svg"></img></a>
            <p id="idcopyrighttext" class="normaltext normaltext">Copyright &copy; 2026 powerNotsans</p>
        </footer>

        <script src="index.js"></script>
    </body>
</html>
